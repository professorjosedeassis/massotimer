<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masso Timer</title>

    <link rel="shortcut icon" href="timer_512.png" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="timer_192.png">
</head>

<body>

    <main class="container" role="main">

        <h1 tabindex="0">Masso Timer</h1>

        <!-- Instruções para leitores -->
        <p id="instrucoes" class="sr-only">
            Deslize para navegar entre as opções e toque duas vezes para iniciar ou parar.
        </p>

        <!-- Display apenas visual -->
        <h2 id="display" aria-hidden="true">00:00</h2>

        <!-- Botões acessíveis universalmente -->
        <button id="massagem1" aria-describedby="instrucoes">
            Massagem 1 - 2 minutos
        </button>

        <button id="massagem2" aria-describedby="instrucoes">
            Massagem 2 - 3 minutos
        </button>

    </main>

    <script src="app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/massotimer/sw.js')
                .then((registration) => {
                    console.log('Service Worker registrado:', registration.scope);
                })
                .catch((error) => {
                    console.log('Erro no Service Worker:', error);
                });
        }
    </script>

</body>

</html>
