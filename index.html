<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masso Timer</title>

    <link rel="shortcut icon" href="timer_512.png" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="timer_192.png">
</head>

<body>

  <main class="container" role="main" tabindex="-1">

    <h1>Masso Timer</h1>

    <!-- Região de instrução -->
    <p class="sr-only" id="instrucoes">
        Deslize para navegar entre as opções e toque duas vezes para ativar.
    </p>

    <!-- Display visual -->
    <h2 id="display">00:00</h2>

    <!-- Região para leitor -->
    <div id="timer-status" class="sr-only" aria-live="polite"></div>

    <!-- Botões agrupados -->
    <div role="group" aria-label="Opções de massagem">

        <button id="massagem1"
            aria-label="Iniciar massagem de 2 minutos"
            aria-pressed="false">
            MASSAGEM 1 - 2 MIN
        </button>

        <button id="massagem2"
            aria-label="Iniciar massagem de 3 minutos"
            aria-pressed="false">
            MASSAGEM 2 - 3 MIN
        </button>

    </div>

</main>


    <script src="app.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/massotimer/sw.js')
                .then((registration) => {
                    console.log('Service Worker registrado:', registration.scope);
                })
                .catch((error) => {
                    console.log('Erro no Service Worker:', error);
                });
        }
    </script>

</body>

</html>
